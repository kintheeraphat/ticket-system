{% extends "base.html" %}
{% block title %}Edit Stock{% endblock %}

{% block content %}
<div class="form-card">

  <h4 class="mb-4">✏️ แก้ไขข้อมูลสต๊อก</h4>

  <form method="post">
    {% csrf_token %}

    <div class="grid-2">
      <div>
        <label class="form-label">ชื่ออุปกรณ์</label>
        <input type="text"
               name="name"
               class="form-control"
               value="{{ stock.name }}"
               required>
      </div>

      <div>
        <label class="form-label">สเปค</label>
        <input type="text"
               name="spec"
               class="form-control"
               value="{{ stock.spec }}">
      </div>

      <div>
        <label class="form-label">ประเภท</label>
        <select name="item_type" class="form-select" required>
          <option value="borrow"
            {% if stock.item_type == "borrow" %}selected{% endif %}>
            Borrow
          </option>
          <option value="userup"
            {% if stock.item_type == "userup" %}selected{% endif %}>
            User Up
          </option>
        </select>
      </div>

      <div>
        <label class="form-label">จำนวน</label>
        <input type="number"
               name="quantity"
               class="form-control"
               min="0"
               value="{{ stock.quantity }}"
               required>
      </div>
    </div>

    <div class="d-flex gap-2 mt-4">
      <button class="btn btn-primary">
        💾 บันทึก
      </button>
      <a href="{% url 'stock_dashboard' %}"
         class="btn btn-secondary">
        ยกเลิก
      </a>
    </div>

  </form>

</div>
{% endblock %}
