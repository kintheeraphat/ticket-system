{% extends "base.html" %}
{% block title %}Dispatch List{% endblock %}

{% block content %}
<div class="dashboard-table">

  <h4 class="mb-4">📦 รายการรอจ่ายของ</h4>

  {% if borrows %}
  <table class="table table-hover align-middle">
    <thead>
      <tr>
        <th>ID</th>
        <th>หัวข้อ</th>
        <th>ผู้ขอ</th>
        <th class="text-center">Action</th>
      </tr>
    </thead>
    <tbody>
      {% for b in borrows %}
      <tr class="hover-row">
        <td>{{ b.id }}</td>
        <td class="fw-semibold">{{ b.title }}</td>
        <td class="text-muted">{{ b.full_name }}</td>
        <td class="text-center">
          <a href="{% url 'stock_dispatch_detail' b.id %}"
             class="action-btn"
             title="จ่ายของ">
            <i class="bi bi-box-arrow-up"></i>
          </a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
    <div class="text-center text-muted py-4">
      ไม่มีรายการรอจ่าย
    </div>
  {% endif %}

</div>
{% endblock %}
