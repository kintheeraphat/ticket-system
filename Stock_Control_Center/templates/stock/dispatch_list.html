{% extends "base.html" %}
{% block title %}Dispatch List{% endblock %}

{% block content %}
<div class="container-fluid">
  
  <div class="d-flex justify-content-between align-items-center mb-4">

  <h4 class="fw-bold mb-0">
    <i class="fas fa-truck text-warning me-2"></i>
    รายการรอจ่ายของ
  </h4>

  <a href="{% url 'stock_dashboard' %}" class="btn btn-secondary btn-sm">
    ← กลับ
  </a>

</div>
  <div class="card shadow-sm">
    <div class="card-body">

      {% if borrows %}
      <table class="table table-striped align-middle">
        <thead class="table-light text-center">
          <tr>
            <th>ID</th>
            <th>หัวข้อ</th>
            <th>ผู้ขอ</th>
            <th>จัดการ</th>
          </tr>
        </thead>
        <tbody>
          {% for b in borrows %}
          <tr>
            <td class="text-center">{{ b.id }}</td>
            <td>{{ b.title }}</td>
            <td>{{ b.full_name }}</td>
            <td class="text-center">
              <a href="{% url 'stock_dispatch_detail' b.id %}"
                 class="btn btn-sm btn-warning">
                จ่ายของ
              </a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      {% else %}
        <div class="text-center text-muted py-4">ไม่มีรายการ</div>
      {% endif %}

    </div>
  </div>

</div>
{% endblock %}
